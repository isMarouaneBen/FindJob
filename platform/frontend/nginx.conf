# nginx config for the FindJob SPA.
#  - SPA fallback so client-side routes (React Router) work on refresh.
#  - /api  →  reverse-proxy to the FastAPI service on the docker network.
#  - aggressive cache for hashed assets; no-cache for index.html.

upstream findjob_api {
    server platform-api:8000;
}

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip everything text-ish
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types application/javascript application/json text/css text/plain
               image/svg+xml application/xml;

    # Hashed Vite assets — long-term cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy — keeps the SPA's relative `/api/v1/...` calls working.
    location /api/ {
        proxy_pass         http://findjob_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 10m;          # large enough for CV uploads
    }

    # SPA fallback — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Basic hardening
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
