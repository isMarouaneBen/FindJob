version: "3.8"

# ==============================================================
#  PROJET JOB INTELLIGENT — Docker Compose unifié
#  Airflow 2.8 (LocalExecutor) + MongoDB + PostgreSQL
#  Optimisé pour machine locale Windows
# ==============================================================

x-airflow-common: &airflow-common
  image: job-intelligent/airflow:2.8.1
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-job_intelligent_secret}
    AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin123}

    # Variables accessibles dans les DAGs
    MONGO_URI: mongodb://admin:admin123@mongodb:27017/
    POSTGRES_DATA_URI: postgresql://datauser:datapass@postgres:5432/job_db
    PLATFORM_API_URL: http://platform-api:8000/api/v1
    PLATFORM_ADMIN_TOKEN: ${ADMIN_TOKEN:-local-admin-token-change-me}
  env_file:
    - .env
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/airflow/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/airflow/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/airflow/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/scrapers:/opt/airflow/scrapers
    - ${AIRFLOW_PROJ_DIR:-.}/etl:/opt/airflow/etl
    - ${AIRFLOW_PROJ_DIR:-.}/transformers:/opt/airflow/transformers
  depends_on:
    postgres:
      condition: service_healthy
    mongodb:
      condition: service_healthy
  networks:
    - job_network

services:

  # ────────────────────────────────────────────
  #  1. POSTGRESQL
  #     - Base "airflow"  : metadata Airflow
  #     - Base "job_db"   : Silver + Gold layers
  #     - pgvector extension for embeddings
  #     Accès : localhost:5432
  # ────────────────────────────────────────────
  postgres:
    build:
      context: ./postgres-init
      dockerfile: Dockerfile
    container_name: job_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datapass}
      POSTGRES_DB: ${POSTGRES_DB:-job_db}
    ports:
      - "5433:5432"   # host 5433 → container 5432 (5432 is taken by a native Windows Postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - job_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datauser -d job_db && pg_isready -U airflow -d airflow || pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ────────────────────────────────────────────
  #  2. PGADMIN — Interface PostgreSQL
  #     Accès : http://localhost:5050
  #     Login : admin@jobintelligent.ma / admin123
  # ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: job_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@jobintelligent.ma}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - job_network

  # ────────────────────────────────────────────
  #  3. MONGODB — Bronze / Raw layer
  #     Accès : localhost:27017
  # ────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: job_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: job_raw
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - job_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  #  4. MONGO EXPRESS — Interface MongoDB
  #     Accès : http://localhost:8081
  #     Login : admin / admin123
  # ────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: job_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-admin123}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASICAUTH_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASICAUTH_PASSWORD:-admin123}
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - job_network

  # ────────────────────────────────────────────
  #  5. AIRFLOW INIT — Migration DB + user admin
  #     S'exécute une seule fois au démarrage
  # ────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: job_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "Waiting for PostgreSQL to be fully ready..."
        for i in {1..30}; do
          if psql -h postgres -U airflow -d airflow -c "SELECT 1" 2>/dev/null; then
            echo "PostgreSQL is ready!"
            break
          fi
          echo "Attempt $$i/30: Waiting for PostgreSQL..."
          sleep 2
        done
        
        echo "Running Airflow database migration..."
        airflow db migrate
        
        echo "Creating admin user..."
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USER:-admin}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD:-admin123}" \
          --firstname Admin \
          --lastname JobIntelligent \
          --role Admin \
          --email admin@jobintelligent.ma || true
        
        echo "Airflow init completed successfully."
    restart: "no"

  # ────────────────────────────────────────────
  #  6. AIRFLOW WEBSERVER
  #     Accès : http://localhost:8080
  #     Login : admin / admin123
  # ────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: job_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ────────────────────────────────────────────
  #  7. AIRFLOW SCHEDULER
  #     Exécute les DAGs selon le planning
  # ────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: job_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ────────────────────────────────────────────
  #  8. REDIS — cache & idempotency keys
  # ────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: job_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - job_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ────────────────────────────────────────────
  #  9. KAFKA (KRaft mode, single broker)
  # ────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: job_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - job_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ────────────────────────────────────────────
  # 10. MINIO — CV blob storage (S3-compatible)
  #     Console : http://localhost:9001
  # ────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: job_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - job_network
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────
  # 11. FASTAPI PLATFORM — Job Recommendation API
  #     Accès : http://localhost:8000
  #     Health : http://localhost:8000/api/v1/health
  # ────────────────────────────────────────────
  platform-api:
    build: ./platform
    container_name: job_platform_api
    ports:
      - "8000:8000"
    volumes:
      # Persist the HuggingFace model cache so rebuilds don't re-download
      # the ~470 MB sentence-transformers model.
      - hf_cache:/root/.cache/huggingface
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-datauser}:${POSTGRES_PASSWORD:-datapass}@postgres:5432/${POSTGRES_DB:-job_db}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      EMBEDDING_DEVICE: cpu
      JWT_SECRET: ${JWT_SECRET:-please-set-a-long-random-secret-in-dot-env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-local-admin-token-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - job_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ────────────────────────────────────────────
  # 12. CV PARSING WORKER — Kafka consumer
  # ────────────────────────────────────────────
  cv-worker:
    build:
      context: ./platform
      dockerfile: Dockerfile
    container_name: job_cv_worker
    command: ["python", "-u", "-m", "app.workers.cv_consumer"]
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-datauser}:${POSTGRES_PASSWORD:-datapass}@postgres:5432/${POSTGRES_DB:-job_db}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - job_network
    restart: unless-stopped

  # ────────────────────────────────────────────
  #  9. EMBEDDING WORKER (Optional)
  #     Generates vector embeddings for job offers
  #     Run with: docker compose run embedding-worker
  # ────────────────────────────────────────────
  # embedding-worker:
  #   build:
  #     context: .
  #     dockerfile: platform/Dockerfile.worker
  #   container_name: job_embedding_worker
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://datauser:datapass@postgres:5432/job_db
  #     EMBEDDING_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  #     BATCH_SIZE: 32
  #     DEVICE: cpu  # Change to 'cuda' for GPU acceleration
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - job_network
  #   restart: "no"

  # ────────────────────────────────────────────
  # 13. FRONTEND — React (Vite) served by nginx, reverse-proxies /api
  #     Accès : http://localhost:5173
  # ────────────────────────────────────────────
  frontend:
    build:
      context: ./platform/frontend
      dockerfile: Dockerfile
      args:
        # Both are PUBLIC — they end up in the JS bundle.
        VITE_API_URL: /api/v1
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: job_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      platform-api:
        condition: service_started
    networks:
      - job_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5

# ────────────────────────────────────────────
#  VOLUMES persistants
# ────────────────────────────────────────────
volumes:
  postgres_data:
  mongodb_data:
  pgadmin_data:
  minio_data:
  hf_cache:

# ────────────────────────────────────────────
#  RÉSEAU interne partagé entre tous les services
# ────────────────────────────────────────────
networks:
  job_network:
    driver: bridge